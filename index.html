<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Atom Model</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }
#ui { position:fixed; inset:0; pointer-events:none; z-index:10; }

#title { position:absolute; top:18px; left:50%; transform:translateX(-50%); text-align:center; white-space:nowrap; }
#title h1 { font-size:12px; letter-spacing:7px; color:#4af; text-transform:uppercase; text-shadow:0 0 14px #4af8; opacity:.85; }
#title p  { font-size:9px; letter-spacing:3px; color:#345; margin-top:3px; }

#panel {
  position:absolute; right:16px; top:50%; transform:translateY(-50%);
  background:rgba(2,14,28,.9); border:1px solid rgba(64,160,255,.22);
  border-radius:8px; padding:16px 15px; width:195px; pointer-events:all;
  backdrop-filter:blur(6px);
}
.ptitle { font-size:8px; letter-spacing:4px; color:#4af; text-transform:uppercase; border-bottom:1px solid rgba(64,160,255,.15); padding-bottom:7px; margin-bottom:13px; }
.row { margin-bottom:12px; }
.row-label { display:flex; justify-content:space-between; font-size:9px; letter-spacing:.8px; color:#578; margin-bottom:4px; }
.row-label em { color:#4df; font-style:normal; }
input[type=range] { width:100%; -webkit-appearance:none; height:2px; background:rgba(64,160,255,.18); border-radius:2px; outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:#4af; box-shadow:0 0 7px #4af; cursor:pointer; }
select { width:100%; background:rgba(2,14,28,.9); border:1px solid rgba(64,160,255,.25); color:#4df; font-family:'Courier New',monospace; font-size:9px; padding:5px 7px; border-radius:4px; cursor:pointer; outline:none; }
select option { background:#00111f; }
.sep { height:1px; background:rgba(64,160,255,.12); margin:12px 0; }
.hints { font-size:8px; color:#345; line-height:1.9; }
.hints b { color:#467; }

#legend { position:absolute; left:16px; bottom:18px; }
.li { display:flex; align-items:center; gap:7px; font-size:9px; letter-spacing:.5px; color:#456; margin-bottom:5px; }
.ld { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

#clip-msg { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); font-size:8px; letter-spacing:3px; color:rgba(255,150,60,.65); text-transform:uppercase; pointer-events:none; opacity:0; transition:opacity .3s; }
#clip-msg.on { opacity:1; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">
    <h1>Quantum Atom</h1>
    <p>Probability Cloud Model</p>
  </div>

  <div id="panel">
    <div class="ptitle">Controls</div>
    <div class="row">
      <label class="row-label">Element <em id="el-lbl">Hydrogen</em></label>
      <select id="sel-element">
        <option value="1">H — Hydrogen (1e)</option>
        <option value="2">He — Helium (2e)</option>
        <option value="3">Li — Lithium (3e)</option>
        <option value="6">C — Carbon (6e)</option>
        <option value="8">O — Oxygen (8e)</option>
        <option value="10">Ne — Neon (10e)</option>
        <option value="18">Ar — Argon (18e)</option>
      </select>
    </div>
    <div class="row">
      <label class="row-label">Cloud Density <em id="v-density">60%</em></label>
      <input type="range" id="sl-density" min="10" max="100" value="60">
    </div>
    <div class="row">
      <label class="row-label">Clip Plane <em id="v-clip">Off</em></label>
      <input type="range" id="sl-clip" min="0" max="100" value="0">
    </div>
    <div class="row">
      <label class="row-label">Speed <em id="v-speed">1.0x</em></label>
      <input type="range" id="sl-speed" min="1" max="30" value="10">
    </div>
    <div class="sep"></div>
    <div class="hints">
      <b>Drag</b> — orbit view<br>
      <b>Scroll</b> — zoom in/out<br>
      <b>Clip Plane</b> — slice atom open<br>
      Brighter cloud = higher probability
    </div>
  </div>

  <div id="legend">
    <div class="li"><div class="ld" style="background:#44aaff;box-shadow:0 0 5px #44aaff"></div>1s</div>
    <div class="li"><div class="ld" style="background:#ff8844;box-shadow:0 0 5px #ff8844"></div>2s</div>
    <div class="li"><div class="ld" style="background:#44ff88;box-shadow:0 0 5px #44ff88"></div>2p</div>
    <div class="li"><div class="ld" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div>3s</div>
    <div class="li"><div class="ld" style="background:#ffff44;box-shadow:0 0 5px #ffff44"></div>3p</div>
  </div>

  <div id="clip-msg">— clipping active —</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x020810, 1);
renderer.localClippingEnabled = true;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020810, 0.005);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 600);
camera.position.set(0, 0, 60);
camera.lookAt(0, 0, 0);

// ── Orbit controls ────────────────────────────────────────────────────
let drag = false, px = 0, py = 0;
let theta = 0, phi = Math.PI/2, radius = 60;

canvas.addEventListener('mousedown',  e => { drag=true; px=e.clientX; py=e.clientY; });
canvas.addEventListener('touchstart', e => { drag=true; px=e.touches[0].clientX; py=e.touches[0].clientY; }, {passive:true});
window.addEventListener('mouseup',  () => drag=false);
window.addEventListener('touchend', () => drag=false);

function onMove(cx, cy) {
  if (!drag) return;
  theta -= (cx-px)*0.009;
  phi   -= (cy-py)*0.009;
  phi = Math.max(0.08, Math.min(Math.PI-0.08, phi));
  px=cx; py=cy; camUpdate();
}
window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
window.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
canvas.addEventListener('wheel', e => {
  radius = Math.max(12, Math.min(130, radius + e.deltaY*0.05));
  camUpdate();
});

function camUpdate() {
  camera.position.set(
    radius * Math.sin(phi)*Math.sin(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
}

// ── Lighting ──────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x112233, 2.5));
const pLight = new THREE.PointLight(0x5599ff, 4, 100);
scene.add(pLight);

// ── Clipping ──────────────────────────────────────────────────────────
const clipPlane = new THREE.Plane(new THREE.Vector3(0, -1, 0), 0);
let clipActive = false;
function getCP() { return clipActive ? [clipPlane] : []; }

// Track all materials for fast clip refresh
const allMaterials = [];
function trackMat(m) { allMaterials.push(m); return m; }
function refreshClipping() {
  const p = getCP();
  allMaterials.forEach(m => { m.clippingPlanes = p; });
}
function clearMaterials() { allMaterials.length = 0; }

// ── Orbital config ────────────────────────────────────────────────────
const ORBITALS = [
  { name:'1s', shell:1, capacity:2, r:5,  color:new THREE.Color(0x44aaff), spread:1.8 },
  { name:'2s', shell:2, capacity:2, r:10, color:new THREE.Color(0xff8844), spread:2.5 },
  { name:'2p', shell:2, capacity:6, r:12, color:new THREE.Color(0x44ff88), spread:3.2 },
  { name:'3s', shell:3, capacity:2, r:18, color:new THREE.Color(0xff44ff), spread:3.5 },
  { name:'3p', shell:3, capacity:6, r:21, color:new THREE.Color(0xffff44), spread:4.2 },
];

const ELEMENTS = {
  1:  { name:'Hydrogen', e:[1,0,0,0,0] },
  2:  { name:'Helium',   e:[2,0,0,0,0] },
  3:  { name:'Lithium',  e:[2,1,0,0,0] },
  6:  { name:'Carbon',   e:[2,2,2,0,0] },
  8:  { name:'Oxygen',   e:[2,2,4,0,0] },
  10: { name:'Neon',     e:[2,2,6,0,0] },
  18: { name:'Argon',    e:[2,2,6,2,6] },
};

let currentZ = 1;
let densityPct = 60;
let speedMult = 1.0;

// ── Gaussian ──────────────────────────────────────────────────────────
function gauss() {
  let u=0,v=0;
  while(!u) u=Math.random();
  while(!v) v=Math.random();
  return Math.sqrt(-2*Math.log(u)) * Math.cos(2*Math.PI*v);
}

// ── Glow sprite textures (canvas-drawn radial gradient) ───────────────
function makeGlowTex(color) {
  const S = 128, cv = document.createElement('canvas');
  cv.width = cv.height = S;
  const ctx = cv.getContext('2d');
  const cx = S/2, r = S/2;
  const hex = '#' + color.getHexString();

  const g1 = ctx.createRadialGradient(cx,cx,0, cx,cx,r);
  g1.addColorStop(0,    hex + 'ff');
  g1.addColorStop(0.12, hex + 'ff');
  g1.addColorStop(0.35, hex + 'aa');
  g1.addColorStop(0.65, hex + '44');
  g1.addColorStop(1,    hex + '00');
  ctx.fillStyle = g1;
  ctx.fillRect(0,0,S,S);

  // Bright white core
  const g2 = ctx.createRadialGradient(cx,cx,0, cx,cx,r*0.15);
  g2.addColorStop(0,   '#ffffff');
  g2.addColorStop(0.5, '#ffffff88');
  g2.addColorStop(1,   '#ffffff00');
  ctx.fillStyle = g2;
  ctx.fillRect(0,0,S,S);

  return new THREE.CanvasTexture(cv);
}

const glowTextures = ORBITALS.map(o => makeGlowTex(o.color));

// ── Scene objects ─────────────────────────────────────────────────────
const nucleusGroup = new THREE.Group();
scene.add(nucleusGroup);

let cloudPoints = [];
let electronData = [];

// ── Build nucleus ─────────────────────────────────────────────────────
function buildNucleus(Z) {
  // Remove old nucleus materials from tracking (they'll be garbage collected)
  nucleusGroup.clear();
  const size = 1.4 + Z*0.04;

  const coreMat = trackMat(new THREE.MeshPhongMaterial({
    color: 0xff6622, emissive: 0xff2200, emissiveIntensity: 1.0,
    shininess: 120, clippingPlanes: getCP()
  }));
  nucleusGroup.add(new THREE.Mesh(new THREE.SphereGeometry(size, 32, 32), coreMat));

  [1.9, 2.8, 4.2].forEach((m, i) => {
    const hm = trackMat(new THREE.MeshBasicMaterial({
      color: new THREE.Color(i===0 ? 0xff6600 : 0xff3300),
      transparent: true, opacity: 0.10 - i*0.025,
      side: THREE.FrontSide,
      blending: THREE.AdditiveBlending, depthWrite: false,
      clippingPlanes: getCP()
    }));
    nucleusGroup.add(new THREE.Mesh(new THREE.SphereGeometry(size*m, 16, 16), hm));
  });
}

// ── Build probability clouds ──────────────────────────────────────────
function buildClouds() {
  cloudPoints.forEach(o => scene.remove(o));
  cloudPoints = [];

  const elData = ELEMENTS[currentZ];
  const N = Math.floor(densityPct * 8);

  ORBITALS.forEach((orb, i) => {
    const count = elData.e[i];
    if (!count) return;
    const frac = count / orb.capacity;
    const pts = Math.floor(N * frac * orb.capacity * 15);

    const pos = new Float32Array(pts * 3);
    for (let j = 0; j < pts; j++) {
      const rr = orb.r + gauss() * orb.spread;
      const t  = Math.random() * Math.PI * 2;
      const p  = Math.acos(2*Math.random()-1);
      pos[j*3]   = rr * Math.sin(p)*Math.cos(t);
      pos[j*3+1] = rr * Math.sin(p)*Math.sin(t);
      pos[j*3+2] = rr * Math.cos(p);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    const mat = trackMat(new THREE.PointsMaterial({
      color: orb.color,
      size: 0.22, transparent: true,
      opacity: 0.25 * frac + 0.08,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending, depthWrite: false,
      clippingPlanes: getCP()
    }));

    const p3 = new THREE.Points(geo, mat);
    scene.add(p3);
    cloudPoints.push(p3);
  });
}

// ── Build electrons ───────────────────────────────────────────────────
function buildElectrons() {
  electronData.forEach(ed => scene.remove(ed.group));
  electronData = [];

  const elData = ELEMENTS[currentZ];

  ORBITALS.forEach((orb, orbIdx) => {
    const count = elData.e[orbIdx];
    if (!count) return;

    for (let e = 0; e < count; e++) {
      const group = new THREE.Group();

      // Solid emissive core
      const coreMat = trackMat(new THREE.MeshStandardMaterial({
        color: orb.color,
        emissive: orb.color,
        emissiveIntensity: 4.0,
        roughness: 0.05,
        metalness: 0.0,
        clippingPlanes: getCP()
      }));
      group.add(new THREE.Mesh(new THREE.SphereGeometry(0.30, 16, 16), coreMat));

      // Inner glow sprite (tight)
      const sm1 = trackMat(new THREE.SpriteMaterial({
        map: glowTextures[orbIdx],
        blending: THREE.AdditiveBlending,
        transparent: true, opacity: 1.0,
        depthWrite: false,
        clippingPlanes: getCP()
      }));
      const sp1 = new THREE.Sprite(sm1);
      sp1.scale.setScalar(2.8);
      group.add(sp1);

      // Outer bloom sprite (wide)
      const sm2 = trackMat(new THREE.SpriteMaterial({
        map: glowTextures[orbIdx],
        blending: THREE.AdditiveBlending,
        transparent: true, opacity: 0.35,
        depthWrite: false,
        clippingPlanes: getCP()
      }));
      const sp2 = new THREE.Sprite(sm2);
      sp2.scale.setScalar(7.5);
      group.add(sp2);

      scene.add(group);

      electronData.push({
        group,
        sm1, sm2,
        orbIdx,
        orb,
        phase:  (e / count) * Math.PI * 2,
        incl:   (Math.random()-0.5) * Math.PI,
        azim:   Math.random() * Math.PI * 2,
        speedK: 0.75 + Math.random() * 0.5,
      });
    }
  });
}

// ── Stars ─────────────────────────────────────────────────────────────
{
  const sp = new Float32Array(1200*3);
  for (let i=0; i<1200; i++) {
    sp[i*3]=(Math.random()-.5)*500;
    sp[i*3+1]=(Math.random()-.5)*500;
    sp[i*3+2]=(Math.random()-.5)*500;
  }
  const sg = new THREE.BufferGeometry();
  sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color:0x223355, size:0.35, sizeAttenuation:true })));
}

// ── Initial build ─────────────────────────────────────────────────────
function rebuild() {
  clearMaterials();
  buildNucleus(currentZ);
  buildClouds();
  buildElectrons();
}
rebuild();

// ── UI ────────────────────────────────────────────────────────────────
document.getElementById('sel-element').addEventListener('change', function() {
  currentZ = parseInt(this.value);
  document.getElementById('el-lbl').textContent = ELEMENTS[currentZ].name;
  rebuild();
});

document.getElementById('sl-density').addEventListener('input', function() {
  densityPct = parseInt(this.value);
  document.getElementById('v-density').textContent = densityPct + '%';
  buildClouds();
});

document.getElementById('sl-clip').addEventListener('input', function() {
  const v = parseInt(this.value);
  const clipMsg = document.getElementById('clip-msg');
  if (v === 0) {
    clipActive = false;
    document.getElementById('v-clip').textContent = 'Off';
    clipMsg.classList.remove('on');
  } else {
    clipActive = true;
    // v=1 → cut from below (plane high), v=100 → cut near top
    // plane normal is (0,-1,0), constant C means y > -C is clipped away
    // So constant = -(30 - v*0.5) maps 1→-29.5 (barely cut) to 100→+20 (deep cut)
    const planeY = 28 - v * 0.56;
    clipPlane.constant = planeY;
    document.getElementById('v-clip').textContent = v + '%';
    clipMsg.classList.add('on');
  }
  refreshClipping();
});

document.getElementById('sl-speed').addEventListener('input', function() {
  speedMult = parseInt(this.value) / 10;
  document.getElementById('v-speed').textContent = speedMult.toFixed(1) + 'x';
});

// ── Render loop ───────────────────────────────────────────────────────
let t = 0;
(function loop() {
  requestAnimationFrame(loop);
  t += 0.016 * speedMult;

  // Nucleus pulse
  nucleusGroup.scale.setScalar(1 + 0.025 * Math.sin(t*3.5));
  pLight.intensity = 3.5 + Math.sin(t*2.2);

  // Animate electrons
  electronData.forEach(ed => {
    const baseSpeed = 0.9 / (ed.orb.shell * ed.orb.shell);
    const angle = t * baseSpeed * ed.speedK + ed.phase;
    const r = ed.orb.r;

    const x  =  r * Math.cos(angle);
    const z0 =  r * Math.sin(angle);

    const ci = Math.cos(ed.incl), si = Math.sin(ed.incl);
    const ca = Math.cos(ed.azim), sa = Math.sin(ed.azim);
    const y1 = -z0 * si;
    const z1 =  z0 * ci;

    ed.group.position.set(
      x*ca - z1*sa,
      y1,
      x*sa + z1*ca
    );

    // Pulse glow
    const pulse = 0.8 + 0.2 * Math.sin(t * 4 + ed.phase * 2);
    ed.sm1.opacity = 0.95 * pulse;
    ed.sm2.opacity = 0.32 * pulse;
  });

  // Slowly rotate clouds
  cloudPoints.forEach((o, i) => {
    o.rotation.y += 0.0003 * (i%2===0 ? 1 : -1);
    o.rotation.x += 0.00015;
  });

  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
